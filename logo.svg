<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="97"/>
    </clipPath>
  </defs>
  <!-- Actual logo image clipped to circle -->
  <image href="logo.png" x="0" y="0" width="200" height="200" clip-path="url(#circle-clip)" preserveAspectRatio="xMidYMid slice"/>
  <!-- Gold border ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#f5c842" stroke-width="4"/>
</svg>
