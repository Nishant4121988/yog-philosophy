<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Authorization - Yog Philosophy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d0d;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 90%;
      padding: 40px 30px;
      background: #1a1a2e;
      border-radius: 16px;
      border: 1px solid #333;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 10px; }
    .app-name { font-size: 1.4rem; font-weight: 700; color: #a78bfa; margin-bottom: 20px; }
    .status-box {
      background: #0f3460;
      border: 1px solid #1a6b45;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
    }
    .status-title { color: #4ade80; font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .status-sub { color: #ccc; font-size: 0.9rem; }
    .user-card {
      background: #16213e;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
    }
    .user-card .label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
    .user-card .value { color: #fff; font-size: 1rem; margin-bottom: 12px; }
    .scopes-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .scope-badge {
      background: #312e81;
      color: #a5b4fc;
      border: 1px solid #4338ca;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
    }
    .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }
    .btn-secondary { background: #1f2937; color: #d1d5db; border: 1px solid #374151; }
    .token-box {
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 0.75rem;
      color: #6ee7b7;
      word-break: break-all;
      text-align: left;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#x1F9D8;</div>
    <div class="app-name">Yog Philosophy</div>

    <div class="status-box" id="statusBox">
      <div class="status-title" id="statusTitle">&#x2714; Authorization Successful!</div>
      <div class="status-sub" id="statusSub">Your TikTok account has been successfully connected to Yog Philosophy.</div>
    </div>

    <div class="user-card" id="authInfo">
      <div class="label">Authorization Code</div>
      <div class="value" id="codeDisplay">Loading...</div>
      <div class="label">Granted Scopes</div>
      <div class="scopes-list" id="scopesList"></div>
      <div class="label" style="margin-top:14px">Auth Token (stored)</div>
      <div class="token-box" id="tokenDisplay">Exchanging code for access token...</div>
    </div>

    <div class="actions">
      <a href="upload.html" class="btn btn-primary">&#x1F4E4; Upload &amp; Publish Video</a>
      <a href="index.html" class="btn btn-secondary">&#x2190; Return to Yog Philosophy</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const scopes = params.get('scopes');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      document.getElementById('statusTitle').textContent = '\u274C Authorization Failed';
      document.getElementById('statusTitle').style.color = '#f87171';
      document.getElementById('statusSub').textContent = 'Error: ' + error;
      document.getElementById('statusBox').style.borderColor = '#7f1d1d';
      document.getElementById('authInfo').style.display = 'none';
    } else if (code) {
      // Display auth code (truncated)
      document.getElementById('codeDisplay').textContent = code.substring(0, 30) + '...';

      // Display scopes as badges
      const scopesList = document.getElementById('scopesList');
      if (scopes) {
        scopes.split('%2C').concat(scopes.split(',')).filter((v,i,a) => a.indexOf(v)===i && v).forEach(scope => {
          const badge = document.createElement('span');
          badge.className = 'scope-badge';
          badge.textContent = decodeURIComponent(scope);
          scopesList.appendChild(badge);
        });
      }

      // Simulate token storage (sandbox demo)
      const mockToken = 'act.' + btoa(code.substring(0,10)).replace(/=/g,'') + '.sandbox';
      localStorage.setItem('tiktok_access_token', mockToken);
      document.getElementById('tokenDisplay').textContent = mockToken;

      document.getElementById('statusSub').textContent =
        'TikTok account linked! You can now upload and publish videos via the Content Posting API.';
    } else {
      document.getElementById('statusTitle').textContent = '\u26A0\uFE0F No Authorization Data';
      document.getElementById('statusTitle').style.color = '#fbbf24';
      document.getElementById('statusSub').textContent = 'No authorization code found. Please try logging in again.';
    }
  </script>
</body>
</html>
